name: Update HTML Page

on:
  repository_dispatch:
    types: [update_trigger]

jobs:
  update-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download or Generate New HTML
      run: |
        # 1. 照常下載你原本的網頁內容
        curl -s "https://jvicp.github.io/test.txt" > index.html
        
        # 2. 接收從 curl 傳過來的機器資訊
        # ${{ github.event.client_payload.machine_info }} 就代表你傳過去的字串
        SRC_INFO="${{ github.event.client_payload.machine_info }}"
        
        # 3. 把網頁裡的 <!--MACHINE_INFO_PLACEHOLDER--> 標籤替換成實際的資訊
        # 如果網頁裡沒有這個標籤，也可以改成用 echo 直接加在網頁最後面：
        echo "<p style='color:gray;'>${SRC_INFO}</p>" >> index.html

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add index.html
        git commit -m "Robot更新網頁內容" || exit 0
        git push
